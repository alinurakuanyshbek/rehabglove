<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RehabGlove — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blue: #0A2463;
            --blue-mid: #1E4DB7;
            --orange: #FF6B2B;
            --orange-light: #FF8C55;
            --white: #FAFAFA;
            --gray: #8892A4;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }
        .bg-circle-1 {
            width: 600px; height: 600px;
            background: var(--orange);
            top: -200px; right: -200px;
        }
        .bg-circle-2 {
            width: 400px; height: 400px;
            background: var(--blue-mid);
            bottom: -150px; left: -100px;
            opacity: 0.3;
        }
        .login-box {
            background: var(--white);
            border-radius: 24px;
            padding: 56px 48px;
            width: 440px;
            position: relative;
            z-index: 1;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--orange);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--blue);
        }
        .logo-text span { color: var(--orange); }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: var(--blue);
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 36px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E8ECF4;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--blue);
            background: #F7F9FC;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: var(--orange); background: white; }
        button {
            width: 100%;
            padding: 16px;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        button:hover { background: var(--orange-light); transform: translateY(-1px); }
        .error {
            background: #FFF0EC;
            color: var(--orange);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 3px solid var(--orange);
        }
        .hint {
            text-align: center;
            color: var(--gray);
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">🖐</div>
            <div class="logo-text">Rehab<span>Glove</span></div>
        </div>
        <h1>Doctor Login</h1>
        <p class="subtitle">Access your rehabilitation dashboard</p>
        {% if error %}
        <div class="error">⚠ {{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Sign In →</button>
        </form>
    </div>
</body>
</html>
